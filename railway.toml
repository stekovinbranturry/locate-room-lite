# Railway Config-as-Code — 信令服务（与 Vercel 前端分开部署）
# Dashboard → Service Settings → Config file path: railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.signal"
watchPatterns = ["server/**", "Dockerfile.signal", "railway.toml"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
